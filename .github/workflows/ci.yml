name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -v ./...

      - name: go test
        run: go test -race -count=1 ./...

  govulncheck:
    runs-on: ubuntu-latest
    # Non-blocking: reporta vulns sem falhar o build (camada de defesa
    # complementar ao Renovate). Promover pra blocking quando o baseline
    # de vulns estiver zerado e o time tiver SLA pra reagir.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # A gitleaks-action@v2 exige licença paga para organizações e falhava com
      # "missing gitleaks license". O binário oficial é o mesmo scanner, sem licença.
      - name: gitleaks (binário oficial, histórico completo)
        run: |
          set -euo pipefail
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git --no-banner --redact --exit-code 1 .
